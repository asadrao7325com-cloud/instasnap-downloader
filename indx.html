<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaSnap | Download Fast and Secure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            background-color: #110929;
            background-image: 
                radial-gradient(at 0% 0%, hsla(273, 67%, 20%, 1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(280, 50%, 25%, 1) 0, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(168, 85, 247, 0); }
            100% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0); }
        }
        .animate-glow { animation: pulse-glow 2s infinite; }
    </style>
</head>
<body>

    <nav class="p-6 border-b border-white/5">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-purple-600 rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-bolt-lightning text-white text-xl"></i>
                </div>
                <span class="text-2xl font-black">Insta<span class="text-purple-400">Snap</span></span>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto mt-20 px-6 text-center">
        <h1 class="text-5xl font-extrabold mb-6">Fast. Private. Purple.</h1>
        <p class="text-purple-200/50 text-lg mb-12">Paste your link and let the magic happen.</p>

        <div class="glass-card p-2 rounded-2xl flex flex-col md:flex-row gap-2 max-w-3xl mx-auto">
            <input 
                type="text" 
                id="urlInput"
                placeholder="Paste Instagram link here..." 
                class="flex-1 bg-transparent p-5 outline-none text-white"
            >
            <button 
                onclick="handleDownload()"
                class="bg-purple-600 text-white font-black px-10 py-5 rounded-xl animate-glow"
            >
                Get Video <i class="fa-solid fa-cloud-arrow-down ml-2"></i>
            </button>
        </div>

        <div id="loader" class="hidden mt-16 text-center">
            <div class="w-14 h-14 border-4 border-t-purple-500 rounded-full animate-spin mx-auto"></div>
            <p class="mt-4 text-purple-300">Extracting video...</p>
        </div>

        <div id="resultSection" class="hidden mt-16 scale-95 opacity-0 transition-all duration-500">
            <div class="glass-card p-8 rounded-[32px] max-w-sm mx-auto">
                <i class="fa-solid fa-circle-check text-6xl text-purple-400 mb-6"></i>
                <h3 class="font-bold text-xl mb-6">Video Ready!</h3>
                <a href="#" id="finalDownload" target="_blank" class="block w-full bg-white text-purple-900 font-black py-5 rounded-2xl">
                    DOWNLOAD NOW
                </a>
                <button onclick="location.reload()" class="mt-4 text-xs text-purple-400/60 uppercase font-bold">Download Another</button>
            </div>
        </div>
    </main>

    <script>
        async function handleDownload() {
            const urlInput = document.getElementById('urlInput').value;
            const loader = document.getElementById('loader');
            const result = document.getElementById('resultSection');
            const finalDownload = document.getElementById('finalDownload');

            if (!urlInput.includes('instagram.com')) {
                alert("Please enter a valid Instagram link.");
                return;
            }

            // UI Reset
            result.classList.add('hidden');
            loader.classList.remove('hidden');

            try {
                // Naya Fetch Address (Asad5566)
                const response = await fetch('https://Asad5566.pythonanywhere.com/get-video', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                });

                const data = await response.json();

                if (data.video_url) {
                    finalDownload.href = data.video_url;
                    loader.classList.add('hidden');
                    result.classList.remove('hidden');
                    setTimeout(() => {
                        result.classList.remove('scale-95', 'opacity-0');
                        result.classList.add('scale-100', 'opacity-100');
                    }, 10);
                } else {
                    alert("Error: " + (data.error || "Could not fetch video"));
                    loader.classList.add('hidden');
                }
            } catch (error) {
                alert("Server se rabta nahi ho saka. Kya aapne PythonAnywhere Reload kiya?");
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
