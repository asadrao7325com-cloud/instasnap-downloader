<script>
    async function handleDownload() {
        const urlInput = document.getElementById('urlInput').value;
        const loader = document.getElementById('loader');
        const result = document.getElementById('resultSection');
        const finalDownload = document.getElementById('finalDownload');

        if (!urlInput.includes('instagram.com')) {
            alert("Please enter a valid Instagram link.");
            return;
        }

        // Show Loader
        result.classList.add('hidden');
        loader.classList.remove('hidden');

        try {
            // Aapka PythonAnywhere Link
            const response = await fetch('https://asadrajpoot7325.pythonanywhere.com/get-video', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: urlInput })
            });

            const data = await response.json();

            if (data.video_url) {
                // Success: Show Download Button
                finalDownload.href = data.video_url;
                loader.classList.add('hidden');
                result.classList.remove('hidden');
                setTimeout(() => {
                    result.classList.remove('scale-95', 'opacity-0');
                    result.classList.add('scale-100', 'opacity-100');
                }, 10);
            } else {
                alert("Error: " + (data.error || "Could not fetch video"));
                loader.classList.add('hidden');
            }
        } catch (error) {
            alert("Connection failed! Check if your PythonAnywhere server is running.");
            loader.classList.add('hidden');
        }
    }

    function resetUI() {
        const result = document.getElementById('resultSection');
        result.classList.add('scale-95', 'opacity-0');
        setTimeout(() => {
            result.classList.add('hidden');
            document.getElementById('urlInput').value = "";
        }, 300);
    }
</script>
